
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 배경 지정 */
        body,html{
            background-blend-mode: normal;
            background-image: linear-gradient(205deg,#062173, black);
        }
        body{
            box-sizing: border-box;
            padding: 5px;
            display: flex; /*요소 가로 배열*/
            position: relative;
            align-items: center;
            padding: 0 50px;
            width: 100%;
            border-bottom: white solid 0.5px;
        }
        #menu-list{
            /* 요소 가로 배열 */
            flex-direction: row;
            /* 넓이 지정 */
            width: 50%;
            height: 100%;
            margin: auto; /*가운데 정렬*/
        }
        /* 메뉴 버튼 스타일 지정 */
        #menu-list>a{
            flex: 1;
            flex-direction: row;
            height: 100%;
            /* 색상 지정 */
            background-color: rgba(0,0,0,0);
            border-right: #dce2f2 double;
        }
        /* 보더 마지막 요소에서 제외 */
        #menu-list>a:last-child{
            border-right: none;
        }
        /* 홈으로 가는 로고 크기 지정 */
        #home-logo{
            box-sizing: border-box;
            display: inline-block;
            height: 100%;
        }
        /* 이미지 크기 및 여백 지정 */
        .box{
            height: 80%; /*크기 지정*/
            /* 여백 지정 */
            margin-bottom: 2%;
        }
        /* 메뉴 버튼 글 텍스트 스타일 지정 */
        a>p{
            font-size: large;
            text-shadow: #062173 1px 1px;
        }
        /* 로그인 버튼 스타일 지정 */
        #acc-btn{
            /* 넓이 지정 */
            height: fit-content;
            width: 7%;
            border-radius: 3350px; /*테두리 둥글게 하기*/
        }
    </style>
</head>
<body>
    <!-- 홈 로고 -->
    <a href="/home.html" target="_top" id="home-logo"><img src="/rsc/logo.png" class="logo"></a>
    <!-- 각 창 전환 버튼 -->
    <div id="menu-list" class="sort-center">
        <a href="/contryHome.html" target="_top" class="sort-center hover-style"><div class="box"><img src="/rsc/메뉴바/나라.png" class="logo"></div><p>나라</p></a>
        <a href="/character.html" target="_top" class="sort-center hover-style"><div class="box"><img src="/rsc/메뉴바/캐릭터.png" class="logo"></div><p>캐릭터</p></a>
        <a href="/gacha.html" target="_top" class="sort-center hover-style"><div class="box"><img src="/rsc/메뉴바/뽑기.png" class="logo"></div><p>뽑기</p></a>
    </div>
    <!-- 로그인 버튼 -->
    <button onclick="window.open('/login.html', '_top')">로그인</button></body>
</html>

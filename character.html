<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나라</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        #content{
            padding: 10px;
            width: 70%;
            height: 90%;
            margin: 0 auto;
            margin-top: 50px;
        }
        .list{
            margin-bottom: 5px;
            height: 15vh;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 20px;
            overflow-x: scroll;
        }
        .list>*{
            height: 80%;
            background: none;
            padding: 0;
            background-color: #062173;
            border-radius: 50%;
            box-sizing: border-box;
            position: relative;
        }
        #list img{
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: -20px;
        }
        .list>*:hover{
            border: white solid;
        }
        #list>*:hover{
            background-image: radial-gradient(#dce2f2, rgba(0,0,0,0) 60%);
        }
        #charater{
            height: 80%;
            display: flex;
        }
        #charater>*{
            flex: 1;
            min-width: 0;
        }
        #box2{
            justify-content: space-around;
        }
        #box2>.list{
            overflow: visible;
            width: 80%;
            justify-content: space-between;
        }
        #box1>img,video{
            object-fit: cover;
        }

    </style>
</head>
<body>
    <iframe src="menu.html" class="menu"></iframe>
    <div id="content">
        <div id="list" class="list scrollBar">
        </div>

        <div id="charater" class="container">
            <div id="box1"><img></div> <!-- 시각자료 -->

            <div id="box2" class="sort-center"> <!--우측 자료ㅛ-->
                <h1></h1>
                <p></p>
                <div class="list">
                    <button class="logo" tooltip="일반 공격"><img></button>
                    <button class="logo" tooltip="스킬"><img></button>
                    <button class="logo" tooltip="궁극기"><img></button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 필요 이미지
        // 1. ${name}Prp.png / 캐릭터 버튼 프로필
        // 2. ${name}.png / 캐릭터 정보 좌측 사진
        // 3. ${name}Sk@.png / 캐릭터 스킬 @번
        //필요 영상
        // 1. ${name}V@.mp4 / 캐릭터 동영상 @번
        let propil={}
        let images={}
        let skils={'벤티':[]}
        let contentCrt={}
        let selectSk=null
        function changeScreen(name){
            const image=document.createElement("img")
            image.src=images[name]
            document.querySelector("#box1>*").remove()
            document.querySelector("#box1").appendChild(image)

            document.querySelector("#box2>h1").innerText=name
            document.querySelector("#box2>p").innerText=contentCrt[name]
            
            let btnList=[]
            btnList.push(document.querySelector("#box2>.list>button[tooltip='일반 공격']>img"))
            btnList.push(document.querySelector("#box2>.list>button[tooltip='스킬']>img"))
            btnList.push(document.querySelector("#box2>.list>button[tooltip='궁극기']>img"))
            for (const i in btnList) {
                btnList[i].src=skils[name][i]

                btnList[i].addEventListener('click',()=>{
                    selectSk=btnList[i]
                    playVidio(`/rsc/캐릭터/${name}V${+i+1}.mp4`)
                })
                btnList[i].style.border="none"
            }
        }
        function playVidio(vidio){
            let box=document.querySelector("#box1")
            box.replaceChildren()
            let vdo=document.createElement("video")
            vdo.src=vidio
            vdo.autoplay=true
            vdo.loop = true;
            box.appendChild(vdo)
        }
        function newCharacter(name, contents){
            let button=document.createElement("button")
            let img=document.createElement("img")
            img.src=`/rsc/캐릭터/${name}Prp.png`
            button.appendChild(img)
            button.setAttribute('tooltip', name)
            button.classList.add("logo")
            button.onclick=()=>{changeScreen(name)}
            contentCrt[name]=contents
            propil[name]=`/rsc/캐릭터/${name}Prp.png`
            images[name]=`/rsc/캐릭터/${name}.png`
            skils[name]=[`/rsc/캐릭터/${name}Sk1.png`,`/rsc/캐릭터/${name}Sk2.png`,`/rsc/캐릭터/${name}Sk3.png`]
            document.querySelector("#list").appendChild(button)
        }

        newCharacter('벤티', '정체가 불분명한 음유시인. \n가끔 아주 오래전의 노래를 부르고 가끔은 누구도 들어보지 못한 새로운 \n노래를 부른다.\n「바람」 원소의 힘을 끌어낼 때 원소의 모습이 깃털처럼 보여진다. \n이는 그가 하늘하늘거리는 물건을 마음에 들어 하기 때문이다.\n\ntmi : 바람의 신이지만 정체를 숨기고 다닌다. 술을 굉장히 좋아한다.')
        newCharacter('종려', '「왕생당」의 초대를 받고 온 신비로운 객경.\n 잘생긴 외모에 고상한 행동거지, 범인을 뛰어넘는 학식을 가지고 있다.\n정체는 알 수 없지만 예의와 규칙을 잘 알고 있고 \n「왕생당」에서 온갖 의식을 거행한다.\n\n tmi : "아쉽게도 까먹었어"를 내뱉은 장본인.')
        newCharacter('다이루크',' 다이루크는 몬드성 최고의 부자로서 \n품위 있는 태도를 지닌 완벽한 귀공자의 이미지를 보인다.\n그러나 그의 진짜 모습은 신념을 확고히 지키는 전사이다. \n그는 「수단과 방법을 가리지 않고 몬드를 수호한다」는 의지로 불탄다. \n그는 무서운 공세로 모든 적을 인정사정 없이 처리한다.')
        newCharacter('데히야','수메르 사막을 누비는 느슨한 용병 단체 「도금 여단」의 단원. 용감하고 강하여 용병 사이에서 명성이 자자하다.')
        newCharacter('마비카','나타의 불의 신이자 이 땅에서 모두에게 존경받는 지도자. 최고의 힘과 그 힘에 어울리는 기개를 갖추고 있다. 기억과 사랑은 심연에 맞서는 긴 여정에서 그녀를 나아가게 하는 원동력이다. 그녀는 승리로 향하는 길은 수많은 영웅들이 함께 만든 것이고, 자신은 단지 그들의 대행자라고 생각한다. 마비카는 지금까지도 자신의 신념을 지키며 나타를 새로운 미래로 이끌고 있다')
        newCharacter('호두','호두——「왕생당」의 77대 당주. 리월의 장례를 주관하는, 중요한 인물이다. 최선을 다해 사람들의 장례를 치러주고 세상의 음양 간의 균형을 지킨다. 이 외에도 신기한 시인으로서 수많은 「걸작」이 리월 사람들에 의해 전해지고 있다.')
        newCharacter('아를레키노','우인단 서열 4위 「하인」. 벽난로의 집 아이들이 경외해 마지않는 「아버지」다.')
        newCharacter('클레','페보니우스 기사단의 불꽃 기사! 영원히 섬광과 폭발과 함께 나타난다!—그리고 진 단장의 엄격한 눈빛을 보고 묵묵히 사라지곤 한다.비록 새로운 폭약의 제조법은 감금 처벌을 받는 동안 생각해낸 것이지만...클레는 밖에서 노는 게 더 좋다고 생각한다.')
        newCharacter('요이미야','재능이 넘치는 폭죽 장인. 「나가노하라 폭죽가게」의 현 점장이자 「여름 축제의 여왕」. 불꽃처럼 열정적인 소녀로 사그라들지 않는 동심과 장인 정신은 그녀에게 신기한 불꽃 반응을 일으켰다.')
        newCharacter('리니','정교한 트릭과 유려한 말솜씨로 관객들의 마음을 사로잡는 폰타인의 유명한 천재 마술사. 훌륭한 언변과 뛰어난 연기력, 그리고 고양이처럼 종잡을 수 없는 마음을 지녔다.')
        newCharacter('아야토','야시로 봉행 카미사토 가문의 현임 가주. 언제나 면밀한 방식으로 자신의 목적을 실현한다. 하지만 그가 지금 가장 중요하게 여기는 「목적」이 무엇인지 아는 사람은 거의 없다.')
        newCharacter('닐루','「주바이르 극장」의 스타 배우로, 막 피어나 순결한 수련처럼 우아한 자태를 자랑한다. 그렇다고 도도하지는 않아서, 잠시 머물다 가는 나그네조차도 닐루의 잊지 못할 미소를 받을 수 있다.')
        newCharacter('푸리나','모든 물과 백성, 그리고 법을 다스리는 여왕」. 만백성의 깊은 사랑을 받고 있다. 그녀는 에피클레스 오페라 하우스에서 상연되는 모든 심판에 열중하면서도, 늘 「관중」의 시선을 의식하고 있다.')
        newCharacter('모나','신비로운 소녀 점성술사. 자칭 「위대한 점성술사 모나」. 명성에 걸맞은 뛰어난 실력을 가지고 있으며, 박학다식하나 거만하다. 궁핍하고 가난한 생활을 하면서도 모나는 절대 점성술로 돈을 챙기지 않는다… 바로 이런 고집 때문에 모나는 늘 생계를 걱정한다.')
        newCharacter('코코미','코코미는 와타츠미섬의 「아라히토가미 무녀」로 현재 와타츠미섬의 최고 지도자이다. 그녀는 병법을 통독하고 계략에 뛰어나며, 군사적으로도 독특한 견해를 갖고 있다. 그리고 내정, 외교 등 업무들도 질서정연하게 처리한다. 하지만 이 깊이를 헤아릴 수 없는 지도자에게도 사람들이 모르는 면이 있는 것 같다…')
        newCharacter('느비예트','폰타인의 최고 심판관, 「공명정대」하기로 유명하다. 절대적 공정의 상징으로 자리 잡기 위해 늘 온화하고 예의있는 태도를 갖추며, 사람들과 일정한 거리를 유지하지만 사실은 배려심이 아주 깊다. 자기 자신을 「외부인」이라고 생각하지만, 수백 년간 오페라 하우스에서 수많은 사람들의 인간극을 봐온 그는 어쩌면 이미 관중의 일원이 되어있을지도 모른다')
        newCharacter('말라니','나타의 유명 가이드이자 수상 용품 가게 ｢여유로운 빵빵이｣의 경영자인 ｢메즈틀리｣ 출신의 활발한 소녀. 군중 속에서 가장 밝게 빛나는 존재인 그녀의 웃음소리와 환호성은 순식간에 주변 모든 사람의 열정을 불러일으킨다. 그녀에게 세상은 두 분류의 사람으로 나뉜다. 하나는 이미 알고 있는 친구, 다른 하나는 아직 만나지 않은 친구')
        newCharacter('타르탈리아','타르탈리아--스네즈나야에서 건너온 종잡을 수 없는 손님. 그의 생각과 의도를 추측하거나 의심할 필요 없이, 그저 이 앳된 얼굴 아래 극한까지 단련된 전사의 몸이 숨겨져 있다는 사실만 기억하면 된다.')
        newCharacter('야란','자신을 총무부 직원이라고 소개하지만 총무부 명단에 「존재하지 않는」 의문의 인물. 신출귀몰하고 변화무쌍하며 종잡을 수 없는 것이 그녀의 특징이다.')
        newCharacter('시그윈','메로피드 요새의 수간호사. 감옥의 모든 죄수를 평등하게 돌본다. 상냥한 그녀는 「건강은 속죄의 전제」라는 신념을 품고 있으며, 늘 체력이 약한 죄수를 위해 특제 영양식을 준비한다(비록 비주얼은 기이하지만). 이 멜뤼진 수간호사는 인간을 마치 고양이 돌보듯이 즐겁게 돌본다')
        newCharacter('진','페보니우스 기사단 단장 대행 진은 직무를 충실히 이행해 시민들에게 평화를 가져왔다. 비록 천부적인 재능을 타고나지 않았지만 지금의 진은 고된 훈련을 거쳐 한몫을 담당할 수 있을 만큼 성장했다. 풍마룡의 위협이 닥치기 전에 준비를 마친 그녀는 몬드를 지키리라 맹세한다.')
        newCharacter('방랑자','인간을 심장이 있는 자로 정의한다면, 그는 인간이라 부를 수 없다. 심장이 없는 자에게 희로애락의 감정이 있다면, 그것은 인간에 가장 가까운 인형일 것이다.')
        newCharacter('한운','오랫동안 「오장산」에 살고 있는 삼안오현 선인 중 하나인 류운차풍진군. 지금은 「한운」이란 이름의 인간 모습으로 인간 세상을 거닐고 있다. 한운은 맛있는 요리를 좋아하고 기관술 연구에 관심이 많다. 사교 생활을 즐기지 않는다고 하는 것에 비해 인맥이 엄청나게 넓다. 평소 그녀와 교류하는 일반인들은 이 친절하면서도 입담이 익살스러운 여인이 전설 속 비바람을 부르는 선인일 것이라고는 상상도 못 할 것이다')
        newCharacter('미즈키','이나즈마 바쿠 일족의 심리 치료사. 사람들의 악몽을 집어삼키는 능력을 가지고 있다. 이나즈마 실내 온천 「아이사 대중탕」의 대주주로, 「아이사 대중탕」은 손님에게 온천과 미식 서비스는 물론, 전문적인 심리 치료 서비스도 제공한다. 고민이 있다면 미즈키를 찾아가 털어놓아 보자. 그러면 미즈키가 최선을 다해 당신의 마음속에 자리한 악몽을 몰아내 줄 것이다')
        newCharacter('차스카','틀라로칸의 중재자. 그 「분쟁」이 인간과 용 어느 쪽이 일으킨 것이든, 모든 갈등은 그녀의 앞에서 끝난다. 비록 그곳에서 이루어진 「중재」가 언변과 총탄 중 어느 것에 의해 성립되었느냐는 상황에 따라 다르지만 말이다.')
        newCharacter('각청','리월 칠성 중 한 명인 옥형성. 「제군이 모든 걸 결정하는 리월」에 불만을 가지고 있다——그러나 사실 신은 이러한 그녀를 꽤 맘에 들어 한다. 그녀는 인간의 운명은 인간 스스로 결정해야 하며, 심지어 자신들이 신보다 더 잘 할 수 있다고 확신한다. 그녀는 이를 증명하기 위해 그 누구보다 열심히 노력한다.')
        newCharacter('클로린드','「최강」의 결투 대리인. 손에 쥔 검으로 폰타인성의 「공평과 정의」를 수호한다.')
        newCharacter('라이덴','이 세상에서 가장 위엄 있고 무서운 뇌정의 화신이자, 이나즈마 막부의 최고 지배자. 권위의 뇌명을 등에 업고, 영원의 고도(孤道)를 쫓는 적멸자.')
        newCharacter('사이노','아카데미아의 대풍기관, 모든 풍기관의 우두머리. 인상적이며 독특한 농담을 구사한다.')
        newCharacter('미코','나루카미 다이샤를 관장하는 대무녀, 여우 혈통의 계승자, 「영원」의 권속이자 친구, 그리고 라이트 노벨 출판사 「야에 출판사」의 무시무시한 편집장… 다양한 신분을 가진 신비로운 궁사. 평범한 사람들은 아마 영원히 그녀의 진면목과 진심을 알 수 없을 것이다.')

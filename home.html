<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>home</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/slide/slide.css">
    <style>
        .slide-box{
            /* 넓이 지정 */
            width: 100%;      
            height: 100%;
            /*스타일 지정*/
            border-radius: 5px;
            border: white solid;
        }
        .container{
            /* 넓이 지정 */
            width: 80%;
            aspect-ratio: 2/1;
            /* 여백 지정 */
            margin: 0 auto;
            padding: 5%;
            margin-top: 80px;
            /* 정렬 */
            flex-direction: row;
            justify-content: center;
        }
        button{
            /* 넓이 지정 */
            width: 100%;   
            aspect-ratio: 10/1;
        }
        .container>div{
            /* 넓이 지정 및 여백 */
            width: auto;
            height: 100%;
            margin: 0 10px;
        }
        #box2{
            flex: 4;
        }
        .box1{
            flex: 1;
            /* 정렬 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        a>img{
            /* 넓이 지정 및 여백 */
            height: auto;
            width: 80%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- 메뉴바 생성 -->
    <iframe src="menu.html" class="menu"></iframe>
    <!-- 내부 내용 -->
    <div class="container sort-center star-box">
        <!-- 왼쪽 버튼 -->
        <div class="box1">
            <!-- 나라 버튼 -->
            <a href="contryHome.html" class="hover-style sort-center">
                <img class="logo" src="/rsc/메뉴바/나라.png">
                <button>나라</button>

            </a>
            <!-- 공식 유튜브 버튼 -->
            <a class="hover-style sort-center" href="https://www.youtube.com/@Genshinimpact_KR">
                <img class="logo" src="/rsc/메뉴바/유튜브.png">
                <button type="button">공식</button>
            </a>
        </div>
        <!-- 가운데 슬라이드 및 다운로드 버튼 -->
        <div class="sort-center" id="box2">
            <!-- 슬라이드 -->
            <div class="slide-box">
                <div class="slide-track">
                    <img src="/rsc/슬라이드/일러1.jpg">
                    <img src="/rsc/슬라이드/일러2.jpg">
                    <img src="/rsc/슬라이드/일러3.jpg">
                    <img src="/rsc/슬라이드/일러4.jpg">
                </div>
            </div>
            <!-- 다운로드 버튼 -->
            <button type="button" onclick="window.open('https://genshin.hoyoverse.com/ko')">원신 다운로드하러 가기</button>
        </div>
        <!-- 오른쪽 버튼 -->
        <div class="box1">
            <!-- 캐릭터 버튼 -->
            <a href="/character.html" class="hover-style sort-center">
                <img  class="logo" src="/rsc/메뉴바/캐릭터.png">
                <button>캐릭터</button>
            </a>
            <!-- 뽑기 버튼 -->
            <a href="/gacha.html" class="hover-style sort-center">
                <img  class="logo" src="/rsc/메뉴바/뽑기.png">
                <button>뽑기</button>
            </a>
        </div>
        
    </div>
    <script src="/star/star.js"></script>
    <script src="/slide/slide.js"></script>
</body>
</html>

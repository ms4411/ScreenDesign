<!DOCTYPE html>
<html lang="ko">
<head>

    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">

</head>

            <img src="rsc/페이몬.png">

        </div>
        <div class="input-box">
            <h1>로그인</h1>
            <form action="/home.html">
                <ul>
                    <li>
                        <label for="name-id">이메일</label>
                        <input type="email" id="name-id" autofocus>
                    </li>
                    <li>
                        <label for="name-id">비밀번호</label>

                </ul>
                <button type="submit" class="btn-style1">로그인하기</button>
            </form>
            <button type="button" class="btn-style2">게스트로 들어가기</button>
            <a href="/join.html" class="link">회원가입하러 가기</a>
        </div>
        
    </div>

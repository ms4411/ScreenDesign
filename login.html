<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/accept.css">
</head>
<body class="sort-center">
    <div class="container">
        <!-- 좌측 이미지 -->
        <div class="img-box">
            <img src="rsc/페이몬.png">
            <p>여행자님 어서오세요!</p>
        </div>
        <!-- 우측 입력란 -->
        <div class="input-box">
            <h1>로그인</h1>
            <!-- 입력 폼 -->
            <form>
                <ul>
                    <li>
                        <label for="name-id">이메일</label>
                        <input type="email" id="name-id" autofocus>
                    </li>
                    <li>
                        <label for="name-id">비밀번호</label>
                        <input type="password" id="pw-id">
                    </li>
                </ul>
                <button type="submit" class="btn-style1" onclick="window.location.href='/home.html'">로그인하기</button>
            </form>

            <button type="button" class="btn-style2" onclick="window.location.href='/home.html'">게스트로 들어가기</button>
            <a href="/join.html" class="link">회원가입하러 가기</a>
        </div>
        
    </div>
</body>
</html>

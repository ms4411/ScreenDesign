<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나라</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        
        /* 버튼 기능 설명 태그 */
        .list>*::after{
            content: attr(tooltip);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 75%;
            
            border: #062173 solid;
            padding: 1px 5px;
            border-radius: 10000px;
            background-color: #dce2f2;
            color: #062173;
            font-size: medium;
            white-space: nowrap; /* 글자가 아래로 줄바꿈되지 않게 함 */
        }
        #content{
            padding: 10px;
            width: 70%;
            height: 100%;
            margin: 0 auto;
            margin-top: 55px;
        }
        .list{
            margin: 10px 0;
            height: 10vh;
            box-sizing: border-box;
            display: flex;
            gap: 5px;
            justify-content: space-around;
        }
        .list>*{
            background: none;
            padding: 0;
            background-color: #062173;
            border-radius: 50%;
            box-sizing: border-box;
        }
        .list>*:hover{
            border: white solid;
        }
        #pv-btn{
            width: 100%;
            height: 10%;
        }
        #contry{
            width: 100%;
            height: 70%;
        }
        .container{
            height: 100%;
            padding: 0;
        }
        .slide-box{
            height: 60%;
            width: 60%;
            margin: 15px 0;
            border: white solid;
        }
    </style>
</head>
<body>
    <iframe src="menu.html" class="menu"></iframe>
    <div id="content">
        <div class="list">
            <button tooltip="몬드" class="logo"><img src="/rsc/나라/몬드.png"></button>
            <button tooltip="리월" class="logo"><img src="/rsc/나라/리월.png"></button>
            <button tooltip="이나즈마" class="logo"><img src="/rsc/나라/이나즈마.png"></button>
            <button tooltip="수메르" class="logo"><img src="/rsc/나라/수메르.png"></button>
            <button tooltip="폰타인" class="logo"><img src="/rsc/나라/폰타인.png"></button>
            <button tooltip="나타" class="logo"><img src="/rsc/나라/나타.png"></button>
            <button tooltip="스네즈나야" class="logo"><img src="/rsc/나라/스네즈나야.png"></button>
        </div>
        <div id="contry">
            <div id="contry-content" class="container sort-center">
                <h1>티바트</h1>
                <div class="slide-box">
                    <div class="slide-track">
                        <img src="/rsc/슬라이드/일러2.jpg">
                        <img src="/rsc/슬라이드/일러3.jpg">
                        <img src="/rsc/슬라이드/일러4.jpg">
                    </div>
                </div>
                <p style="text-align: center;">
                    7가지 원소가 살아 숨 쉬는 판타지 세계 티바트.<br>
                    아주 오래 전, 사람들은 신령에 대한 신앙을 통해 원소의 힘을 부여받아 황야를 개척하고 나라를 건설했다.<br>
                    500년 전, 오래된 나라가 멸망 후 천지가 개벽하고….<br>

                    대륙을 휩쓸던 재난이 멈췄지만, 사람들이 고대하던 평화는 오지 않았다
                </p>
            </div>
            <button type="button" id="pv-btn">pv보러가기</button>
        </div>
    </div>
    <script src="/js/header.js"></script>
    <script src="/slide/slide.js"></script>
</body>
</html>

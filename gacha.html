<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 공통 지정 */
        #baner,#result{
            flex-direction: row;
            justify-content: space-around;
            height: 80%;
            width: 80%;
            position: relative;
            overflow: hidden;
        }
        /* 결과 화면 */
        #result{
            flex-direction: column;
            justify-content: space-between;
        }
        #baner>*{
            height: 100%;
        }
        /* 메인 5성 캐릭터 위치 및 스타일 지정 */
        #img1{
            position: relative;
            height: 100%;
            width: auto;
        }
        /* 캐릭터 이름과 정보 및 뽑기 버튼 지정 */
        #img1>div{
            position: absolute;
            text-align: left;
            top: 40%;
            left: -100px;
        }
        #img1>div>h1{
            text-align: left;
            font-size: 100px;
        }
        #img1>div>p{
            text-align: left;
        }
        #img1>div>button{
            width: 100%;
        }
        /* 4성 캐릭터 위치 및 스타일 지정 */
        #img2{
            position: absolute;
            height: 500px;
            right: -50px;
            
        }
        #img2>img{
            object-fit: contain;
            height: 250px;
            width: auto;
            margin: -40px 0;
        }
        /* 사진에 따른 위치 변경 */
        #img2>img:nth-child(2){
            margin-right: -100px;
            transform: scale(1.3);
        }
        #img2>img:nth-child(3){
            margin-right: 200px;
            transform: scale(1.6);
        }
        /* 결과 화면 스타일 지정 */
        /* 결과 리스트 스타일 지정 */
        #character-list{
            height: 100%;
            width: 100%;
            background-color: red;
            gap: 10px;
            padding: 10px;
            display: flex;
        }
        #character-list>div{
            background-color: blue;
            height: 100%;
            flex: 1;
        }
        #result>button{
            width: 100%;
        }
        .waring-text{
            margin: 0;
        }
    </style>
</head>
<body class="sort-center">
    <iframe class="menu" src="/menu.html"></iframe>
    <!-- 배너 화면 -->
    <div id="baner" class="sort-center container">
        <div id="img1" name="아를레키노">
            <div>
                <h1>아를레키노</h1>
                <p>난롯가의 잿별 그림자</p>
                <button onclick="changeScreen()">뽑기</button>
            </div>
            <img src="/rsc/캐릭터/아를레키노.png">
        </div>
        <div id="img2" class="sort-center">
            <img src="/rsc/캐릭터/향릉.png">
            <img src="/rsc/캐릭터/프레미네.png">
            <img src="/rsc/캐릭터/리넷.png">
        </div>
    </div>
    <!-- 결과 화면 -->
    <div id="result" class="sort-center container" style="display: none;">
        <div id="character-list">
            <div><img></div>
            <div><img></div>
            <div><img></div>
            <div><img></div>
            <div><img></div>
            <div><img></div>
            <div><img></div>
            <div><img></div>
            <div><img></div>
            <div><img></div>
        </div>
        <button onclick="changeScreen()">돌아가기</button>
    </div>
    <p class="waring-text">이 사이트는 매일 기원이 달라지며 상시 뽑기는 지원하지 않습니다</p>

    <script>
        // 결과 화면과 배너 화면 서로 변경 용도
        function changeScreen(){
            let screen1=document.querySelector("#baner")
            if (screen1.style.display==='none'){
                screen1.style.display=''
                document.querySelector("#result").style.display='none'
            }
            else{
                screen1.style.display='none'
                document.querySelector("#result").style.display=''
            }
        }
    </script>
</body>
</html>

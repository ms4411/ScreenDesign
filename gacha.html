<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 공통 지정 */
        #baner,#result{
            flex-direction: row;
            justify-content: space-around;
            height: 80%;
            width: 80%;
            position: relative;
            overflow: hidden;
        }
        /* 배너 화면 */
        #baner{
            position: relative;
        }
        #baner>*{
            height: 100%;
        }
        /* 결과 화면 */
        #result{
            padding: 20px;
            flex-direction: column;
            justify-content: space-between;
        }
        /* 메인 5성 캐릭터 위치 및 스타일 지정 */
        #img1{
            height: 100%;
            width: auto;
        }
        /* 캐릭터 이름과 정보 및 뽑기 버튼 지정 */
        #img1>div{
            position: absolute;
            text-align: left;
            top: 40%;
            left: 50px;
        }
        /* 캐릭터 이름 스타일 지정 */
        #img1>div>h1{
            text-align: left;
            font-size: 100px;
        }
        /* 뽑기 버튼 */
        #gacha-btn{
            width: 100%;
            font-size: x-large;
        }
        /* 4성 캐릭터 위치 및 스타일 지정 */
        #img2{
            position: absolute;
            height: 500px;
            right: -50px;
            
        }
        /* 4성 캐릭터 이미지 스타일 지정 */
        #img2>img{
            object-fit: contain; /*넓이에 맞추되 이미지 전체가 보이도록 지정*/
            height: 250px;
            width: auto;
            margin: -40px 0;
        }
        /* 사진에 따른 위치 및 크기 변경 */
        #img2>img:nth-child(2){
            margin-right: -100px;
            transform: scale(1.3);
        }
        #img2>img:nth-child(3){
            margin-right: 200px;
            transform: scale(1.6);
        }

        
        /* 결과 화면 스타일 지정 */
        /* 결과 리스트 스타일 지정 */
        #character-list{
            height: 100%;
            width: 100%;
            gap: 10px;
            padding: 10px 0;
            display: flex;
        }
        /* 각 결과 스타일 지정 */
        #character-list>div{
            background-image: url(/rsc/gacha.png);
            background-size: cover;
            overflow: hidden;
            height: 100%;
            padding: 50px 0;
            flex: 1;
            opacity: 0; /*투명화*/
        }
        #character-list img{
            object-fit: cover;
        }
        #result>button{
            /* 넓이 지정 */
            width: 100%;
            aspect-ratio: 15/1;
        }
        .waring-text{
            margin: 0;
        }
        /* 결과 자연스럽게 나타나는 애니메이션 */
        @keyframes fade{
            0%{
                transform: translateX(20px);
            }
            100%{
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body class="sort-center">
    <iframe class="menu" src="/menu.html"></iframe>
    <!-- 배너 화면 -->
    <div id="baner" class="sort-center container">
        <div id="img1" data-name="아를레키노">
            <div>
                <h1></h1>
                <button id="gacha-btn">뽑기</button>
            </div>
            <img>
        </div>
        <div id="img2" class="sort-center">
            <img>
            <img>
            <img>
        </div>
    </div>
    <!-- 결과 화면 -->
    <div id="result" class="sort-center container" style="display: none;">
        <div id="character-list">
            <div class="sort-center" style="--i: 0;"><img><p></p></div>
            <div class="sort-center" style="--i: 1;"><img><p></p></div>
            <div class="sort-center" style="--i: 2;"><img><p></p></div>
            <div class="sort-center" style="--i: 3;"><img><p></p></div>
            <div class="sort-center" style="--i: 4;"><img><p></p></div>
            <div class="sort-center" style="--i: 5;"><img><p></p></div>
            <div class="sort-center" style="--i: 6;"><img><p></p></div>
            <div class="sort-center" style="--i: 7;"><img><p></p></div>
            <div class="sort-center" style="--i: 8;"><img><p></p></div>
            <div class="sort-center" style="--i: 9;"><img><p></p></div>
        </div>
        <button onclick="changeScreen()">돌아가기</button>
    </div>
    <p class="waring-text">이 사이트는 매일 픽업 캐릭터가 달라지며, 상시 뽑기는 지원하지 않습니다</p>

    <script>

        // 결과 화면과 배너 화면 서로 변경 용도
        function changeScreen(){
            let screen1=document.querySelector("#baner")
            //배너 화면 보이기
            if (screen1.style.display==='none'){
                screen1.style.display=''
                document.querySelector("#result").style.display='none'
            }
            //결과 화면 보이기
            else{
                screen1.style.display='none'
                document.querySelector("#result").style.display=''
            }
        }
        // n번째 결과에 name 캐릭터 보이기
        function showC(name, n){
            // 내용 변경
            document.querySelectorAll("#character-list>div>img")[n].src=`/rsc/캐릭터/${name}.png`
            document.querySelectorAll("#character-list>div>p")[n].textContent=name
            document.querySelectorAll("#character-list>div")[n].style.animation="fade 1s calc(var(--i) * 0.1s) forwards"
            // 3성인 경우 css 변경
            if (C3.includes(name)){
                document.querySelectorAll("#character-list>div>img")[n].style.objectFit='contain'
            }
            else{
                document.querySelectorAll("#character-list>div>img")[n].style.objectFit=''
            }
        }

        //뽑기 리스트
        const C3=['비천어검','차가운 칼날','드래곤 블러드 소드','흑술창','드래곤 슬레이어 영웅담','탄궁','까마귀깃 활','여명신검','훌륭한 대화수단','강철의 그림자','비취 오브','마도 서론','신궁의 서약']
        const C4=['베넷','신염','가명','향릉','토마','슈브르즈','연비','엠버','행추','달리아','캔디스','바바라','리넷','사유','설탕','헤이조','남연','파루잔','시노부','레이저','북두','도리','얀사','리사','피슬','사라','세토스','올로룬','키라라','카베','요요','콜레이','레일라','중운','프레미네','로자리아','미카','샤를로트','노엘','운근','카치나','응광','고로','디오나']
        const C5=['다이루크','데히야','모나','진','미즈키','각청','타이나리','치치']
        const up5=document.querySelector('#img1').dataset.name
        const up4s=['향릉','프레미네','헤이조']
        // 배너의 5성과 4성 내용 변경
        document.querySelector("#img1>div>h1").textContent=up5
        document.querySelector("#img1>img").src=`/rsc/캐릭터/${up5}.png`
        for (const idx in document.querySelectorAll("#img2>img")) {
            document.querySelectorAll("#img2>img")[idx].src=`/rsc/캐릭터/${up4s[idx]}.png`
        }
        //스택 저장
        let cnt5=0
        let cnt4=0
        let cntStar=0
        let yes5=false

        function gacha10(){
            let results=[]
            // 10회 돌려서 results에 결과 넣어두기
            for(let i=0;i<10;i++){
                c=Math.random()
                //소프트 천장 확률 보정
                softCnt=(cnt5-73)*0.06
                if (softCnt<0)
                    softCnt=0
                if (cntStar<0)
                    cntStar=0
                // 스택 올리기
                cnt5+=1
                cnt4+=1
                //5성 처리
                if(c<=0.006+softCnt){
                    if(yes5){ //확천인경우
                        results.push(up5)
                        yes5=false
                    }
                    else if(cntStar>=3){ //확천은 아니나 별빛포착인 경우
                        results.push(up5)
                        cntStar=1
                        yes5=false
                    }
                    else if(Math.random()<=0.5 || cnt5>=90){ //반천 처리
                        cntStar-=1
                        results.push(up5)
                        yes5=false
                    }
                    else{ //상시 처리
                        cntStar+=1
                        yes5=true
                        results.push(C5[Math.floor(Math.random()*C5.length)])
                    }
                    //5성 뜬 후 스택 초기화
                    cnt4=0
                    cnt5=0
                }
                //4성 처리
                else if(c<=0.051 || cnt4>=10){
                    cnt4=0
                    if(Math.random()<=0.5){ //4성 픽업 처리
                        results.push(up4s[Math.floor(Math.random()*up4s.length)])
                    }
                    else{
                        results.push(C4[Math.floor(Math.random()*C4.length)])
                    }
                }
                //3성 처리
                else{
                    results.push(C3[Math.floor(Math.random()*C3.length)])
                }

            }
            //4성 정렬 처리
            for (let idx in results){
                let temp=results[idx]
                if (C4.includes(temp)){
                    results.splice(idx,1)
                    results.unshift(temp)
                }
            }
            // 5성 정렬 처리
            for (let idx in results){
                let temp=results[idx]
                if (C5.includes(temp) || up5===temp){
                    results.splice(idx,1)
                    results.unshift(temp)
                }
            }
            //캐릭터 결과 보이기
            for (let idx in results) {
                showC(results[idx],idx)
            }
        }
        // 뽑기 버튼 이벤트 추가
        document.querySelector("#gacha-btn").addEventListener("click",()=>{
            changeScreen() //화면 전화
            gacha10() //뽑기 실행
        })
    </script>
</body>
</html>

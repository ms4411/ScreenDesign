<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/accept.css">
</head>
<body class="sort-center">
    <div class="container">
        <!-- 왼쪽 이미지 박스 -->
        <div class="img-box">
            <img src="rsc/페이몬.png">
            <p>여행자님 환영합니다!</p>
        </div>
        <!-- 오른쪽 입력란 박스 -->
        <div class="input-box">
            <h1>회원가입</h1>
            <form> 
                <ul>
                    <li>
                        <label for="name-id">이메일</label>
                        <input type="email" id="name-id" autofocus>
                    </li>
                    <li>
                        <label for="name-id">비밀번호</label>
                        <input type="password" id="pw-id">
                    </li>
                </ul>
                <button type="submit">회원가입하기</button>
            </form>
            <!-- 경고문 및 로그인으로 가는 링크 -->
            <p class="waring-text">회원가입시 <a href="/개인정보 수집 동의.html">개인정보수집</a> 및 <a href="/마케팅 정보 수신 동의서.html">마케팅 정보 수신</a>에 동의한것으로 간주됩니다.</p>
            <a href="/login.html" class="link">로그인 가기</a>

        </div>
        
    </div>
</body>
</html>
